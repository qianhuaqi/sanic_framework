[loggers]
keys=root, uvicorn.error, uvicorn.access

[handlers]
keys=consoleHandler, errorFileHandler, accessFileHandler

[formatters]
keys=genericFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler, errorFileHandler, accessFileHandler

[logger_uvicorn.error]
level=ERROR
handlers=errorFileHandler
propagate=0
qualname=uvicorn.error

[logger_uvicorn.access]
level=INFO
handlers=accessFileHandler
propagate=0
qualname=uvicorn.access

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=genericFormatter
args=(sys.stdout,)

[handler_errorFileHandler]
class=handlers.TimedRotatingFileHandler
level=ERROR
formatter=genericFormatter
args=('/mnt/logs/sanic/error.log', 'midnight', 1, 7)

[handler_accessFileHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=genericFormatter
args=('/mnt/logs/sanic/access.log', 'midnight', 1, 7)

[formatter_genericFormatter]
format=%(asctime)s - %(levelname)s - %(name)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
