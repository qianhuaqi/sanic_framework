name: Temporary P1-07 Mypy Repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'human/dodo/p1-07-runtime-record-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Repair and verify
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("lingshu/record/model.py")
          lines = path.read_text().splitlines()

          starts = [
              index
              for index, line in enumerate(lines)
              if line == "            return self._drop_or_raise("
          ]
          if len(starts) != 3:
              raise SystemExit(f"expected three drop-return sites, found {len(starts)}")
          for start in reversed(starts):
              lines[start] = "            self._drop_or_raise("
              end = next(
                  index
                  for index in range(start + 1, len(lines))
                  if lines[index] == "            )"
              )
              lines.insert(end + 1, "            return None")

          protocol_index = lines.index("    available: bool")
          lines[protocol_index : protocol_index + 1] = [
              "    @property",
              "    def available(self) -> bool:",
              '        """Return whether reserved capacity remains available."""',
              "        ...",
          ]
          path.write_text("\n".join(lines) + "\n")
          PY
          python -m pip install -q "ruff>=0.8,<1" "mypy>=1.11,<2"
          ruff format lingshu/record tests/record tests/test_package_baseline.py
          ruff check lingshu/record tests/record tests/test_package_baseline.py
          ruff format --check lingshu/record tests/record tests/test_package_baseline.py
          mypy lingshu/record
          rm .github/workflows/p1-07-mypy-diagnostic.yml
      - name: Commit repair
        shell: bash
        run: |
          git config user.name qianhuaqi
          git config user.email 22343174+qianhuaqi@users.noreply.github.com
          git add -A
          git commit -s -m "fix(record): align reservation and drop contracts"
          git push origin HEAD:${{ github.head_ref }}
