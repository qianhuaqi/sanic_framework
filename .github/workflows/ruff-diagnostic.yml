name: Temporary Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -q "ruff>=0.8,<1"
      - run: ruff check . --output-format=concise
