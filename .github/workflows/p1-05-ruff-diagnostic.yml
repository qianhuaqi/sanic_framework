name: Temporary P1-05 Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    if: github.head_ref == 'human/dodo/p1-05-router-middleware'
    runs-on: ubuntu-latest
    steps:
      - name: Clone and run concise Ruff
        shell: bash
        run: |
          git clone -q --depth=1 --branch "$GITHUB_HEAD_REF" "https://github.com/$GITHUB_REPOSITORY.git" source
          cd source
          python -m pip install -q "ruff>=0.8,<1"
          ruff check lingshu/http/router.py lingshu/http/middleware.py lingshu/http/__init__.py tests/http/test_router.py tests/http/test_middleware.py --output-format=concise
