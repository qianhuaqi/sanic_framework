name: Temporary P1-02 Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'human/dodo/p1-02-static-config-snapshot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Produce repair diagnostic
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("lingshu/core/config.py")
          lines = path.read_text().splitlines()
          index = lines.index("        if self.name is not None:")
          lines[index : index + 5] = [
              "        if self.name is not None and (",
              "            not self.name or len(self.name) > 128 or _CONTROL.search(self.name)",
              "        ):",
              "            raise ValueError(\"source name must be non-empty, bounded, and control-free\")",
          ]
          path.write_text("\n".join(lines) + "\n")
          PY
          python -m pip install -q "ruff>=0.8,<1"
          set +e
          ruff check lingshu/core/config.py tests/core/test_config.py --fix > ruff-diagnostic.txt 2>&1
          ruff format lingshu/core/config.py tests/core/test_config.py >> ruff-diagnostic.txt 2>&1
          ruff check . --output-format=concise >> ruff-diagnostic.txt 2>&1
          ruff format --check . >> ruff-diagnostic.txt 2>&1
          git diff -- lingshu/core/config.py tests/core/test_config.py >> ruff-diagnostic.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: p1-02-ruff-diagnostic
          path: ruff-diagnostic.txt
