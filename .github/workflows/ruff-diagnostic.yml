name: Temporary P1-02 Ruff Repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'human/dodo/p1-02-static-config-snapshot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Repair and validate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("lingshu/core/config.py")
          lines = path.read_text().splitlines()
          index = lines.index("        if self.name is not None:")
          replacement = [
              "        if self.name is not None and (",
              "            not self.name or len(self.name) > 128 or _CONTROL.search(self.name)",
              "        ):",
              "            raise ValueError(\"source name must be non-empty, bounded, and control-free\")",
          ]
          lines[index : index + 5] = replacement
          path.write_text("\n".join(lines) + "\n")
          PY
          python -m pip install -q "ruff>=0.8,<1"
          ruff check lingshu/core/config.py tests/core/test_config.py --fix
          ruff format lingshu/core/config.py tests/core/test_config.py
          ruff check .
          ruff format --check .
          rm .github/workflows/ruff-diagnostic.yml
      - name: Commit repair
        shell: bash
        run: |
          git config user.name qianhuaqi
          git config user.email 22343174+qianhuaqi@users.noreply.github.com
          git add -A
          git commit -s -m "style(config): satisfy Ruff contracts"
          git push origin HEAD:${{ github.head_ref }}
