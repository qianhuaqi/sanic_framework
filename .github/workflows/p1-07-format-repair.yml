name: Temporary P1-07 Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'human/dodo/p1-07-runtime-record-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture Ruff output
        shell: bash
        run: |
          python -m pip install -q "ruff>=0.8,<1"
          set +e
          ruff check lingshu/record tests/record tests/test_package_baseline.py --output-format=concise > p1-07-ruff.txt 2>&1
          ruff format lingshu/record tests/record tests/test_package_baseline.py --diff >> p1-07-ruff.txt 2>&1
          ruff format lingshu/record tests/record tests/test_package_baseline.py >> p1-07-ruff.txt 2>&1
          ruff check lingshu/record tests/record tests/test_package_baseline.py --output-format=concise >> p1-07-ruff.txt 2>&1
          ruff format --check lingshu/record tests/record tests/test_package_baseline.py >> p1-07-ruff.txt 2>&1
          git diff -- lingshu/record tests/record tests/test_package_baseline.py >> p1-07-ruff.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: p1-07-ruff-diagnostic
          path: p1-07-ruff.txt
